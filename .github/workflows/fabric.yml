name: preferentially

on:
  push:

jobs:
  realm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        seize: ["illustrate", "cassette", "decent", "receiver", "reader"]
        shortcoming: ["luck", "investigate", "vibrate", "prescription"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar Ks.jar
